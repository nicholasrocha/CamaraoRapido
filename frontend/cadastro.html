<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Cadastro - Camarão Rápido</title>

  <link rel="stylesheet" href="css/login.css">

</head>

<body>

  <div class="container">

    <!-- LADO ESQUERDO -->

    <div class="left">

      <h1>
        🦐 Camarão Rápido
      </h1>

      <p>
        Cadastre-se para comprar ou vender camarão.
      </p>

    </div>

    <!-- LADO DIREITO -->

    <div class="right">

      <form id="formCadastro">

        <h2>Criar Conta</h2>

        <input
          type="text"
          id="nome"
          placeholder="Seu nome"
          required
        >

        <input
          type="email"
          id="email"
          placeholder="Seu e-mail"
          required
        >

        <input
          type="text"
          id="cpf"
          placeholder="CPF"
          required
          maxlength="14"
        />

        <input
          type="text"
          id="celular"
          placeholder="Celular"
          required
          maxlength="20"
        />
        
        <input
          type="password"
          id="senha"
          placeholder="Sua senha"
          required
        >

        <!-- TIPO -->

        <div class="tipoUsuario">

          <label>

            <input
              type="radio"
              name="tipo"
              value="produtor"
              required
            >

            Produtor

          </label>

          <label>

            <input
              type="radio"
              name="tipo"
              value="comprador"
            >

            Comprador

          </label>

        </div>

        <button type="submit">
          Cadastrar
        </button>

        <p class="cadastro">

          Já possui conta?

          <a href="login.html">
            Entrar
          </a>

        </p>

      </form>

    </div>

  </div>

  <script src="js/cadastro.js"></script>

</body>

</html>
