<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Login - Camarão Rápido</title>

  <link rel="stylesheet" href="css/login.css">

</head>

<body>

  <div class="container">

    <!-- LADO ESQUERDO -->

    <div class="left">

      <h1>
        🦐 Camarão Rápido
      </h1>

      <p>
        Plataforma de venda direta de camarão do produtor para compradores.
      </p>

    </div>

    <!-- LADO DIREITO -->

    <div class="right">

      <form id="formLogin">

        <h2>Entrar</h2>

        <input
          type="email"
          id="email"
          placeholder="Digite seu e-mail"
          required
        >

        <input
          type="password"
          id="senha"
          placeholder="Digite sua senha"
          required
        >

        <button type="submit">
          Entrar
        </button>

        <p class="cadastro">
          Não possui conta?
          <a href="cadastro.html">
            Cadastre-se
          </a>
        </p>

      </form>

    </div>

  </div>

  <script src="js/login.js"></script>

</body>

</html>
